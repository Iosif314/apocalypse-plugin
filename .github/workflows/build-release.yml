name: Build and release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build plugin jar
        run: ./gradlew shadowJar --no-daemon

      - name: Locate built jar
        id: jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "빌드된 jar를 찾지 못했습니다" >&2
            exit 1
          fi
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      # "latest"라는 고정 태그를 매번 덮어써서, 다운로드 스크립트가 항상 같은 URL로 최신 빌드를 받을 수 있게 한다.
      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          make_latest: true
          files: ${{ steps.jar.outputs.path }}
