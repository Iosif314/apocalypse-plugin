name: Build and release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build plugin jar
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar --no-daemon

      - name: Locate built jar
        id: jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "빌드된 jar를 찾지 못했습니다" >&2
            exit 1
          fi
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      # jar 파일명에 버전이 들어가면서(예: Apocalypse-1.10.11.jar), softprops/action-gh-release가
      # "같은 파일명일 때만" 자동으로 덮어쓰는 방식이라 매 빌드마다 예전 버전 jar가 안 지워지고 계속 쌓였다.
      # (그래서 배포 스크립트가 "가장 오래된" jar를 최신으로 착각하는 버그가 실제로 발생했었다.)
      # 새로 올리기 전에 "latest" 릴리스에 이미 붙어있는 jar 에셋을 전부 지운다.
      - name: Remove stale jar assets from "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAMES=$(gh release view latest --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null | grep '\.jar$' || true)
          for name in $ASSET_NAMES; do
            gh release delete-asset latest "$name" --repo "$GITHUB_REPOSITORY" --yes || true
          done

      # "latest"라는 고정 태그를 매번 덮어써서, 다운로드 스크립트가 항상 같은 URL로 최신 빌드를 받을 수 있게 한다.
      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          make_latest: true
          files: ${{ steps.jar.outputs.path }}
